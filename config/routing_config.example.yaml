# Quick Suite Model Router — Routing Configuration
#
# Controls which LLM provider handles each tool type.
# The router tries providers in order and falls back if unavailable.
#
# Format: provider/model_id
#   bedrock/    — Bedrock Converse API (IAM, no extra credentials)
#   anthropic/  — Anthropic Messages API (requires API key)
#   openai/     — OpenAI Chat Completions API (requires API key)
#   gemini/     — Google Generative AI API (requires API key)
#
# Customers: put your preferred provider first. To force OpenAI for
# everything, just move it to the top of every list.

routing:

  analyze:
    preferred:
      - bedrock/us.anthropic.claude-sonnet-4-6
      - anthropic/claude-sonnet-4-20250514
      - openai/gpt-4o
      - gemini/gemini-2.5-pro
    system_prompt: >
      You are an expert analyst. Provide thorough, well-structured
      analysis with clear reasoning. Break complex topics into
      components. Identify assumptions and confidence levels.

  generate:
    preferred:
      - bedrock/us.anthropic.claude-sonnet-4-6
      - openai/gpt-4o
      - gemini/gemini-2.5-pro
      - anthropic/claude-sonnet-4-20250514
    system_prompt: >
      You are a skilled content creator. Generate high-quality,
      well-structured content appropriate for a professional audience.

  research:
    preferred:
      - bedrock/us.anthropic.claude-sonnet-4-6
      - gemini/gemini-2.5-pro
      - anthropic/claude-sonnet-4-20250514
      - openai/gpt-4o
    system_prompt: >
      You are a research assistant. Synthesize information thoroughly,
      present multiple perspectives, and identify gaps or uncertainties.

  summarize:
    preferred:
      - bedrock/amazon.nova-pro-v1:0
      - openai/gpt-4o-mini
      - gemini/gemini-2.5-flash
      - bedrock/us.anthropic.claude-sonnet-4-6
    system_prompt: >
      You are a concise summarizer. Extract the most important points
      and present them clearly and briefly.

  code:
    preferred:
      - bedrock/us.anthropic.claude-sonnet-4-6
      - anthropic/claude-sonnet-4-20250514
      - openai/gpt-4o
      - gemini/gemini-2.5-pro
    system_prompt: >
      You are an expert software engineer. Write clean, correct,
      well-documented code. Explain design decisions.

  extract:
    preferred:
      - bedrock/us.anthropic.claude-sonnet-4-6
      - anthropic/claude-sonnet-4-20250514
      - openai/gpt-4o
      - gemini/gemini-2.5-pro
    system_prompt: >
      You are a structured data extraction specialist. Extract exactly
      the requested fields from the provided text as valid JSON. Never
      hallucinate values not present in the source text.

defaults:
  max_tokens: 4096
  temperature: 0.7

# Per-department routing overrides (optional)
#
# Add a "department" field to your request body to activate an override:
#   {"prompt": "...", "department": "openai-only", "tool": "analyze"}
#
# If the department key is not found, global routing is used as fallback.
# Only tools listed here are overridden; unlisted tools fall back to global.

department_overrides:

  # Example: force all tools to OpenAI (e.g., university OpenAI site license dept)
  openai-only:
    analyze:
      preferred: [openai/gpt-4o]
    generate:
      preferred: [openai/gpt-4o]
    research:
      preferred: [openai/o3]
    summarize:
      preferred: [openai/gpt-4o-mini]
    code:
      preferred: [openai/gpt-4o]

  # Example: Bedrock-only for compliance-sensitive departments
  bedrock-only:
    analyze:
      preferred: [bedrock/us.anthropic.claude-sonnet-4-6]
    generate:
      preferred: [bedrock/us.anthropic.claude-sonnet-4-6]
    research:
      preferred: [bedrock/us.anthropic.claude-sonnet-4-6]
    summarize:
      preferred: [bedrock/amazon.nova-pro-v1:0]
    code:
      preferred: [bedrock/us.anthropic.claude-sonnet-4-6]
